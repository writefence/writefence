name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"

      - name: Test
        run: go test ./...

      - name: Vet
        run: go vet ./...

      - name: Race tests
        run: go test -race ./...

      - name: Vulnerability scan
        run: go run golang.org/x/vuln/cmd/govulncheck@latest ./...

      - name: Build writefence
        run: go build ./cmd/writefence

      - name: Build writefence-cli
        run: go build ./cmd/writefence-cli

      - name: Build writefence-mcp
        run: go build ./cmd/writefence-mcp
