name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      publish_release:
        description: "Publish the GitHub Release after build artifacts are created"
        required: true
        default: false
        type: boolean
      owner_approval:
        description: "Type: I have explicit owner approval to publish this GitHub Release"
        required: true
        type: string

permissions:
  contents: read

jobs:
  build:
    name: build ${{ matrix.goos }}-${{ matrix.goarch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            runner: ubuntu-latest
          - goos: linux
            goarch: arm64
            runner: ubuntu-latest
          - goos: darwin
            goarch: amd64
            runner: macos-latest
          - goos: darwin
            goarch: arm64
            runner: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"

      - name: Build archive
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          VERSION: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          name="writefence_${VERSION}_${GOOS}_${GOARCH}"
          out="dist/${name}"
          mkdir -p "${out}"
          go build -trimpath -ldflags="-s -w" -o "${out}/writefence" ./cmd/writefence
          go build -trimpath -ldflags="-s -w" -o "${out}/writefence-cli" ./cmd/writefence-cli
          go build -trimpath -ldflags="-s -w" -o "${out}/writefence-mcp" ./cmd/writefence-mcp
          tar -C dist -czf "${name}.tar.gz" "${name}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: writefence_${{ github.ref_name }}_${{ matrix.goos }}_${{ matrix.goarch }}
          path: writefence_${{ github.ref_name }}_${{ matrix.goos }}_${{ matrix.goarch }}.tar.gz
          if-no-files-found: error

  release:
    name: publish release assets
    if: >-
      github.event_name == 'workflow_dispatch' &&
      inputs.publish_release == true &&
      startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest
    environment: owner-approved-github-release
    permissions:
      contents: write
    steps:
      - name: Verify owner approval attestation
        env:
          OWNER_APPROVAL: ${{ inputs.owner_approval }}
        run: |
          set -euo pipefail
          expected="I have explicit owner approval to publish this GitHub Release"
          if [ "${OWNER_APPROVAL}" != "${expected}" ]; then
            printf 'Release publication requires the exact owner approval attestation.\n' >&2
            exit 1
          fi

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        run: |
          set -euo pipefail
          cd dist
          sha256sum *.tar.gz > checksums.txt

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          gh release create "${VERSION}" dist/*.tar.gz dist/checksums.txt \
            --title "${VERSION}" \
            --notes "WriteFence ${VERSION}"
